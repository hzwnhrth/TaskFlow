<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="TaskFlow — A modern, elegant task management application with priority tracking, categories, and beautiful UI.">
    <title>TaskFlow — Modern Task Manager</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✅</text></svg>">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="app-logo">
                <div class="app-logo-icon">✅</div>
                <h1>TaskFlow</h1>
            </div>
            <div class="header-actions">
                <button class="theme-toggle" id="theme-toggle" title="Toggle theme">☀️</button>
                <button class="btn-add-task" id="btn-add-task">
                    <span>＋</span> New Task
                </button>
            </div>
        </header>

        <!-- Stats Bar -->
        <section class="stats-bar" aria-label="Task statistics">
            <div class="stat-card">
                <span class="stat-label">Total Tasks</span>
                <span class="stat-value accent" id="stat-total">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Completed</span>
                <span class="stat-value" id="stat-completed">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Pending</span>
                <span class="stat-value" id="stat-pending">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Overdue</span>
                <span class="stat-value" id="stat-overdue">0</span>
            </div>
        </section>

        <!-- Toolbar -->
        <div class="toolbar">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="search-input" placeholder="Search tasks... (Ctrl+N to add)" autocomplete="off">
            </div>
            <select class="filter-select" id="filter-category" aria-label="Filter by category">
                <option value="all">All Categories</option>
                <option value="general">General</option>
                <option value="work">Work</option>
                <option value="personal">Personal</option>
                <option value="health">Health</option>
                <option value="finance">Finance</option>
                <option value="learning">Learning</option>
            </select>
            <select class="filter-select" id="filter-priority" aria-label="Filter by priority">
                <option value="all">All Priorities</option>
                <option value="critical">Critical</option>
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
            </select>
        </div>

        <!-- Task List -->
        <main class="task-list" id="task-list">
            <div class="task-list-empty">
                <div class="empty-icon">📋</div>
                <h3>No tasks yet</h3>
                <p>Click "New Task" to create your first task!</p>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" role="dialog" aria-labelledby="modal-title">
            <div class="modal-header">
                <h2 id="modal-title">New Task</h2>
                <button class="modal-close" id="modal-close" title="Close">✕</button>
            </div>
            <form id="task-form" autocomplete="off">
                <div class="form-group">
                    <label class="form-label" for="task-title">Title</label>
                    <input class="form-input" type="text" id="task-title" placeholder="What needs to be done?" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="task-description">Description</label>
                    <textarea class="form-textarea" id="task-description" placeholder="Add details about this task..."></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="task-priority">Priority</label>
                        <select class="form-select" id="task-priority">
                            <option value="low">🟢 Low</option>
                            <option value="medium" selected>🟡 Medium</option>
                            <option value="high">🟠 High</option>
                            <option value="critical">🔴 Critical</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="task-category">Category</label>
                        <select class="form-select" id="task-category">
                            <option value="general">📁 General</option>
                            <option value="work">💼 Work</option>
                            <option value="personal">👤 Personal</option>
                            <option value="health">💪 Health</option>
                            <option value="finance">💰 Finance</option>
                            <option value="learning">📚 Learning</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="task-due-date">Due Date</label>
                    <input class="form-input" type="date" id="task-due-date">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="btn-cancel">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <script src="assets/js/app.js"></script>
</body>
</html>
